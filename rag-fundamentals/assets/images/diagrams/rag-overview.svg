<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2563eb" />
    </marker>
  </defs>

  <!-- User Query -->
  <rect x="50" y="170" width="120" height="60" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">User Query</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="200" x2="230" y2="200" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Document Corpus -->
  <rect x="230" y="50" width="120" height="100" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="290" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Document</text>
  <text x="290" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#374151">Corpus</text>
  <text x="290" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">(Vector Store)</text>

  <!-- Retrieval Arrow -->
  <line x1="290" y1="150" x2="290" y2="180" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="310" y="170" font-family="Arial, sans-serif" font-size="11" fill="#2563eb">Similarity</text>
  <text x="310" y="183" font-family="Arial, sans-serif" font-size="11" fill="#2563eb">Search</text>

  <!-- Retrieved Context -->
  <rect x="230" y="190" width="120" height="60" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="290" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">Retrieved</text>
  <text x="290" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">Context</text>

  <!-- Arrow 2 -->
  <line x1="350" y1="220" x2="410" y2="220" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Context + Query Box -->
  <rect x="410" y="170" width="120" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Context +</text>
  <text x="470" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#92400e">User Query</text>
  <text x="470" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78350f">(Augmented Prompt)</text>

  <!-- Arrow 3 -->
  <line x1="530" y1="210" x2="590" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- LLM -->
  <rect x="590" y="50" width="120" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="650" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#5b21b6">LLM</text>
  <text x="650" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6d28d9">(Language</text>
  <text x="650" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6d28d9">Model)</text>

  <!-- Generation Arrow -->
  <line x1="650" y1="150" x2="650" y2="180" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="670" y="168" font-family="Arial, sans-serif" font-size="11" fill="#2563eb">Generates</text>

  <!-- Final Answer -->
  <rect x="590" y="190" width="120" height="60" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="650" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">Final Answer</text>
  <text x="650" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#059669">(with sources)</text>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e40af">Retrieval Augmented Generation (RAG) Pipeline</text>

  <!-- Step Numbers -->
  <circle cx="200" cy="200" r="12" fill="#2563eb"/>
  <text x="200" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">1</text>

  <circle cx="290" cy="165" r="12" fill="#2563eb"/>
  <text x="290" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">2</text>

  <circle cx="380" cy="220" r="12" fill="#2563eb"/>
  <text x="380" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">3</text>

  <circle cx="560" cy="210" r="12" fill="#2563eb"/>
  <text x="560" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">4</text>

  <circle cx="650" cy="165" r="12" fill="#2563eb"/>
  <text x="650" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">5</text>
</svg>
