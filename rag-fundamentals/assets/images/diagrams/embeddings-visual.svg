<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500">
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e40af">Embeddings: Semantic Similarity in Vector Space</text>

  <!-- Axes -->
  <line x1="100" y1="450" x2="650" y2="450" stroke="#9ca3af" stroke-width="2"/>
  <line x1="100" y1="450" x2="100" y2="80" stroke="#9ca3af" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="375" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Dimension 1</text>
  <text x="40" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" transform="rotate(-90 40 265)">Dimension 2</text>

  <!-- Document chunks (similar documents clustered) -->

  <!-- Cluster 1: Menu related -->
  <circle cx="200" cy="200" r="8" fill="#3b82f6" opacity="0.7"/>
  <text x="200" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e40af">"menu"</text>

  <circle cx="220" cy="210" r="8" fill="#3b82f6" opacity="0.7"/>
  <text x="220" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e40af">"dishes"</text>

  <circle cx="190" cy="225" r="8" fill="#3b82f6" opacity="0.7"/>
  <text x="190" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e40af">"food"</text>

  <ellipse cx="205" cy="215" rx="45" ry="40" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="205" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Menu</text>

  <!-- Cluster 2: Reservation related -->
  <circle cx="450" cy="180" r="8" fill="#10b981" opacity="0.7"/>
  <text x="450" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#047857">"reservation"</text>

  <circle cx="470" cy="200" r="8" fill="#10b981" opacity="0.7"/>
  <text x="500" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#047857">"booking"</text>

  <circle cx="440" cy="210" r="8" fill="#10b981" opacity="0.7"/>
  <text x="415" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#047857">"table"</text>

  <ellipse cx="453" cy="197" rx="50" ry="40" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="453" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#047857">Reservations</text>

  <!-- Cluster 3: Team/People related -->
  <circle cx="300" cy="350" r="8" fill="#f59e0b" opacity="0.7"/>
  <text x="300" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">"chef"</text>

  <circle cx="330" cy="360" r="8" fill="#f59e0b" opacity="0.7"/>
  <text x="355" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">"team"</text>

  <circle cx="310" cy="380" r="8" fill="#f59e0b" opacity="0.7"/>
  <text x="295" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">"staff"</text>

  <ellipse cx="313" cy="363" rx="45" ry="40" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="313" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#92400e">People</text>

  <!-- User Query -->
  <circle cx="480" cy="160" r="12" fill="#ec4899" stroke="#be185d" stroke-width="3"/>
  <text x="480" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Q</text>
  <text x="480" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#be185d">User Query</text>
  <text x="480" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#be185d">"How do I book?"</text>

  <!-- K-Nearest Neighbors Lines -->
  <line x1="480" y1="160" x2="450" y2="180" stroke="#ec4899" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="480" y1="160" x2="470" y2="200" stroke="#ec4899" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="480" y1="160" x2="440" y2="210" stroke="#ec4899" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="80" y="60" width="180" height="100" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#374151">How it works:</text>

  <text x="90" y="100" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">1. Text chunks → Vectors</text>
  <text x="90" y="115" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">2. Similar meaning → Close in space</text>
  <text x="90" y="130" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">3. Query finds K-nearest neighbors</text>
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">4. Return most relevant chunks</text>

  <!-- Note -->
  <text x="350" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#9ca3af">Simplified 2D visualization (actual embeddings are 1536-dimensional)</text>
</svg>
