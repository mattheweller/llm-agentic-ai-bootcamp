<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b7280" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e40af">LangChain Components</text>

  <!-- Document Loaders -->
  <rect x="50" y="80" width="150" height="80" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="125" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Document</text>
  <text x="125" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Loaders</text>
  <text x="125" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6">Load data from</text>
  <text x="125" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6">various sources</text>

  <!-- Arrow to Text Splitters -->
  <line x1="200" y1="120" x2="270" y2="120" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Text Splitters -->
  <rect x="270" y="80" width="150" height="80" rx="8" fill="#fae8ff" stroke="#a855f7" stroke-width="2"/>
  <text x="345" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7e22ce">Text</text>
  <text x="345" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#7e22ce">Splitters</text>
  <text x="345" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9333ea">Break documents</text>
  <text x="345" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#9333ea">into chunks</text>

  <!-- Arrow to Embeddings -->
  <line x1="420" y1="120" x2="490" y2="120" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Embeddings -->
  <rect x="490" y="80" width="150" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="565" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Embeddings</text>
  <text x="565" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b45309">Convert text to</text>
  <text x="565" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b45309">numerical vectors</text>

  <!-- Arrow down from Embeddings -->
  <line x1="565" y1="160" x2="565" y2="210" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vector Stores -->
  <rect x="490" y="220" width="150" height="80" rx="8" fill="#dcfce7" stroke="#10b981" stroke-width="2"/>
  <text x="565" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">Vector</text>
  <text x="565" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#047857">Stores</text>
  <text x="565" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#059669">Store embeddings for</text>
  <text x="565" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#059669">similarity search</text>

  <!-- Arrow to Retrievers -->
  <line x1="490" y1="260" x2="420" y2="260" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Retrievers -->
  <rect x="270" y="220" width="150" height="80" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="345" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#be185d">Retrievers</text>
  <text x="345" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#db2777">Fetch relevant docs</text>
  <text x="345" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#db2777">based on query</text>

  <!-- Arrow to Chains -->
  <line x1="270" y1="260" x2="200" y2="260" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Chains -->
  <rect x="50" y="220" width="150" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="125" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4338ca">Chains</text>
  <text x="125" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4f46e5">Orchestrate</text>
  <text x="125" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4f46e5">multiple components</text>

  <!-- LLMs (Central) -->
  <rect x="290" y="360" width="220" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="3"/>
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#5b21b6">Language Models</text>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6d28d9">LLMs power the generation</text>
  <text x="400" y="438" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6d28d9">Used by Chains</text>

  <!-- Arrows to LLMs -->
  <line x1="125" y1="300" x2="340" y2="380" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
  <line x1="345" y1="300" x2="390" y2="360" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <text x="50" y="490" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Data Flow →</text>
  <line x1="120" y1="485" x2="160" y2="485" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="200" y="490" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Uses - - →</text>
  <line x1="260" y1="485" x2="300" y2="485" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)"/>
</svg>
